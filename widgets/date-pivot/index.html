<!DOCTYPE html>
<html>
<head>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    body { font-family: sans-serif; }
    table { border-collapse: collapse; }
    td, th { border: 1px solid #ccc; padding: 6px; text-align: center; }
    th { background: #eee; }
  </style>
</head>
<body>
  <div id="config"></div>
  <table id="pivot"></table>

  <script>
    grist.ready({
      columns: [
        {name: "rowField", title: "Champ lignes", type: "Text"},
        {name: "colField", title: "Champ colonnes", type: "Text"},
        {name: "valField", title: "Champ valeur", type: "Numeric"}
      ]
    });

    let options = {};
    let records = [];

    grist.onOptions(opts => {
      options = opts;
      render();
    });

    grist.onRecords(r => {
      records = r;
      render();
    });

    function render() {
      if (!options.rowField || !options.colField || !options.valField) {
        document.getElementById("pivot").innerHTML = "<tr><td>Configure les champs dans les options du widget</td></tr>";
        return;
      }

      const rowField = options.rowField;
      const colField = options.colField;
      const valField = options.valField;

      let rows = new Set();
      let cols = new Set();
      let data = {};

      records.forEach(r => {
        let row = r[rowField];
        let col = r[colField];
        let val = r[valField] || 0;

        if (row == null || col == null) return;

        rows.add(row);
        cols.add(col);

        if (!data[row]) data[row] = {};
        data[row][col] = (data[row][col] || 0) + val;
      });

      rows = Array.from(rows).sort();
      cols = Array.from(cols).sort();

      const table = document.getElementById("pivot");
      table.innerHTML = "";

      // Header
      let header = "<tr><th></th>";
      cols.forEach(c => header += `<th>${c}</th>`);
      header += "</tr>";
      table.innerHTML += header;

      // Rows
      rows.forEach(r => {
        let rowHtml = `<tr><td><b>${r}</b></td>`;
        cols.forEach(c => {
          let val = data[r]?.[c] ?? "";
          rowHtml += `<td>${val}</td>`;
        });
        rowHtml += "</tr>";
        table.innerHTML += rowHtml;
      });
    }
  </script>
</body>
</html>
